# SonarQube Cloud automatic analysis does not read sonar-project.properties.
sonar.exclusions=tests/**/*

# The Avalonia port intentionally mirrors the WinForms class names, file structure, and
# code-behind flow while both front ends coexist. Keep normal analysis enabled for these
# files, but do not classify the cross-framework twins as accidental duplication.
sonar.cpd.exclusions=src/app/GitUI.Avalonia/**/*.cs,src/app/GitExtensions.Avalonia/**/*.cs
