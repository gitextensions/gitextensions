## Sonar project configuration (local overrides)
## Ignore specific Sonar rule(s) for files that must remain as macros
## or intentionally use platform-specific include casing.
##
## Rationale:
## - `pch.h`: contains Windows-targeting preprocessor defines (`NOMINMAX`,
##   `WIN32_LEAN_AND_MEAN`, `_WIN32_WINNT`) and include directives that are
##   necessary for correct compilation on Windows. These patterns trigger
##   `cpp:S5028` (suggesting constexpr/enum) and `cpp:S3806` (case-sensitivity
##   warning for include paths). The defines are required and the include names
##   match Windows headers on disk for case-insensitive Windows filesystems;
##   suppressing these specific Sonar rules for `pch.h` avoids noisy false
##   positives while keeping other rules active.
## - `resource.h`: resource IDs are required as `#define` for the resource
##   compiler. Suppress `cpp:S5028` for this file so Sonar does not recommend
##   replacing resource macros that are needed by tooling.

sonar.projectKey=gitextensions
sonar.projectName=GitExtensions
sonar.sources=.

sonar.issue.ignore.multicriteria=e1,e2,e3
## Ignore the 'Modernize macro to constexpr/enum' rule (cpp:S5028)
## for selected files where macros are required by platform tooling.
sonar.issue.ignore.multicriteria.e1.ruleKey=cpp:S5028
sonar.issue.ignore.multicriteria.e1.resourceKey=**/src/native/GitExtensionsModernShellEx/pch.h
sonar.issue.ignore.multicriteria.e2.ruleKey=cpp:S5028
sonar.issue.ignore.multicriteria.e2.resourceKey=**/src/native/GitExtensionsModernShellEx/resource.h
## Ignore the non-portable include path case rule (cpp:S3806) for the
## precompiled header which intentionally references Windows headers.
sonar.issue.ignore.multicriteria.e3.ruleKey=cpp:S3806
sonar.issue.ignore.multicriteria.e3.resourceKey=**/src/native/GitExtensionsModernShellEx/pch.h
