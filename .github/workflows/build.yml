name: Build and test

on:
  push:
    branches:
      - master
      - release
      - 'release/**'
      - 'experimental/**'
    tags:
      - '*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/release' && !startsWith(github.ref, 'refs/heads/release/') }}

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BUILD_VERSION_BASE: 7.3.0

jobs:
  build-and-test:
    name: Build & Test
    # A separate job for test takes too much time for transferring artifacts and setting up the job.
    # So we build and test in the same job, but upload test results as a separate artifact to be consumed by the test-report job.
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      has-test-results: ${{ steps.upload-test-results.outputs.artifact-id != '' }}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        global-json-file: global.json

    - name: Cache NuGet packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Show tool versions
      run: |
        dotnet --version
        git --version

    - name: Resolve build version
      shell: pwsh
      run: |
        $buildVersion = "${{ env.BUILD_VERSION_BASE }}.${{ github.run_number }}"
        $ref = "${{ github.ref }}"
        $suffix = ""

        if ($ref.StartsWith("refs/tags/"))
        {
          # Tags are stable.
        }
        elseif ($ref -eq "refs/heads/release" -or $ref.StartsWith("refs/heads/release/"))
        {
          $suffix = "-preview"
        }
        else
        {
          $suffix = "-dev"
        }

        "BUILD_VERSION=$buildVersion$suffix" >> $env:GITHUB_ENV
        # Consumed by the packaging targets to include the pre-release marker in the portable/MSI file names.
        "ARTIFACT_BUILD_SUFFIX=$suffix" >> $env:GITHUB_ENV

    - name: Set version
      working-directory: eng
      run: dotnet run set_version_to.cs -- -v ${{ env.BUILD_VERSION }} -t ${{ env.BUILD_VERSION }}

    - name: Resolve PR build properties
      if: github.event_name == 'pull_request'
      shell: pwsh
      env:
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        $gitCommit = git rev-parse --short $env:PR_HEAD_SHA
        "BUILD_ARGS=/p:GitCommit=$gitCommit /p:GitSha=$env:PR_HEAD_SHA" >> $env:GITHUB_ENV

    - name: Build native code
      run: dotnet build src\native\build.proj -c Release --verbosity q --nologo /bl:artifacts\log\native.binlog

    - name: Build .NET
      shell: pwsh
      run: |
        $buildArgs = "/p:ContinuousIntegrationBuild=true $env:BUILD_ARGS".Trim()
        dotnet build -c Release --verbosity q --nologo /bl:artifacts\log\build.binlog $buildArgs.Split(' ', [StringSplitOptions]::RemoveEmptyEntries)

    - name: Verify localisation
      shell: pwsh
      run: |
        git reset --hard HEAD
        Push-Location src\app\GitExtensions
        dotnet msbuild /p:Configuration=Release /t:_UpdateEnglishTranslations /p:RunTranslationApp=true /p:ContinuousIntegrationBuild=true /v:m /bl:${{ github.workspace }}\artifacts\log\localise.binlog
        $exitCode = $LASTEXITCODE
        Pop-Location
        if ($exitCode -ne 0) { exit $exitCode }

    - name: Publish
      shell: pwsh
      run: |
        $buildArgs = "/p:ContinuousIntegrationBuild=true $env:BUILD_ARGS".Trim()
        dotnet publish -c Release --no-build /bl:artifacts\log\publish.binlog $buildArgs.Split(' ', [StringSplitOptions]::RemoveEmptyEntries)

    - name: Resolve portable archive name
      id: portable-name
      shell: pwsh
      run: |
        $zip = Get-ChildItem artifacts\Release\publish\*.zip | Select-Object -First 1
        if (-not $zip) { throw 'No publish zip found under artifacts\Release\publish' }
        "name=$($zip.BaseName)" >> $env:GITHUB_OUTPUT

    - name: Upload portable archive
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ steps.portable-name.outputs.name }}
        # Upload the published folder contents, not the .zip: actions/upload-artifact always zips its input,
        # so uploading the pre-built .zip would nest a zip inside GitHub's artifact zip.
        path: 'artifacts\Release\publish\GitExtensions\**'
        retention-days: 7

    - name: Run tests
      run: dotnet test -c Release --no-restore --no-build --nologo --verbosity q --test-adapter-path:. --logger:trx /bl:artifacts\log\tests.binlog

    - name: Upload test results
      id: upload-test-results
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: test-results
        path: 'artifacts\Release\TestsResults\**\*.trx'
        retention-days: 7
        if-no-files-found: ignore

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: build-logs
        path: |
          artifacts\**\log\**\*.binlog
          **\English*.xlf
          artifacts\Release\**\*.dgml
        retention-days: 7
        if-no-files-found: ignore

  test-report:
    name: Test Report
    runs-on: ubuntu-latest
    needs: build-and-test
    if: always() && needs.build-and-test.outputs.has-test-results == 'true'
    permissions:
      actions: read
      contents: read
      checks: write

    steps:
    - name: Create test report
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      continue-on-error: true
      with:
        artifact: test-results
        name: Test Results
        path: '**/*.trx'
        reporter: dotnet-trx
        max-annotations: 50  # do not increase over the allowed maximum of 50
