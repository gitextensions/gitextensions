name: Stale Checks

# Stale handling for issues and pull requests awaiting author feedback.
#
# Only items that already carry the ":mailbox_with_no_mail: needs: author feedback"
# label are considered. After 30 days of inactivity they are marked with
# ":zzz: status: no recent activity" and a comment is posted; after a further
# 7 days they are closed. Closed pull requests are additionally labelled
# "status: abandoned" (issues are simply closed).
on:
  schedule:
    # Run once daily. Off the hour and during a typically quiet UTC window
    # to reduce GitHub's scheduled-workflow queuing delays.
    - cron: '37 4 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  stale:
    # Restrict to the upstream repository so forks don't run the cleanup.
    if: ${{ github.repository_owner == 'gitextensions' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      issues: write
      pull-requests: write

    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899 # v10.3.0
        with:
          # Only act on items awaiting author feedback.
          only-labels: ":mailbox_with_no_mail: needs: author feedback"

          # 30 days inactivity -> stale, then 7 more days -> closed.
          days-before-stale: 30
          days-before-close: 7

          # Label applied when an item becomes stale.
          stale-issue-label: ":zzz: status: no recent activity"
          stale-pr-label: ":zzz: status: no recent activity"

          # Comment posted when an item becomes stale.
          stale-issue-message: >-
            This issue has been automatically marked as stale because it has been
            marked as requiring author feedback but has not had any activity for
            **30 days**. It will be closed in **7 days** if no further activity occurs.
          stale-pr-message: >-
            This pull request has been automatically marked as stale because it has
            been marked as requiring author feedback but has not had any activity
            for **30 days**. It will be closed in **7 days** if no further activity occurs.

          # "status: abandoned" is applied only to closed pull requests.
          close-pr-label: "status: abandoned"

          # Draft pull requests are still work-in-progress, so don't stale them
          # even if they carry the "needs: author feedback" label.
          exempt-draft-pr: true

          # Do not let the stale action clear the no-recent-activity label on any
          # update: it treats a comment from *anyone* (e.g. a maintainer) as
          # activity, which incorrectly resets the stale timer. The label must be
          # removed only when the original author responds. That author-only
          # removal is handled by the "Label Lifecycle" workflow
          # (.github/workflows/label-lifecycle.yml).
          remove-stale-when-updated: false

          # Process a generous number of items per run to avoid backlog.
          operations-per-run: 100
