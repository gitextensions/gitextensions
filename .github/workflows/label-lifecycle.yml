name: Label Lifecycle

# Converted from the retired FabricBot configuration (.github/fabricbot.json).
#
# Manages the author-feedback and no-recent-activity labels in real time:
#
#   * Add ":mailbox_with_no_mail: needs: author feedback" when a reviewer
#     requests changes on a pull request.
#   * Remove ":mailbox_with_no_mail: needs: author feedback" when the *author*
#     pushes, comments or reviews (PRs), or comments (issues).
#   * Remove ":zzz: status: no recent activity" on any new pull request activity,
#     and on author activity for issues.
#
# `pull_request_target` is used (rather than `pull_request`) so that label writes
# work for pull requests opened from forks, consistent with the other labeler
# workflows in this repository. No fork code is checked out or executed.
on:
  pull_request_target:
    types: [opened, reopened, synchronize, edited]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  contents: read

concurrency:
  group: label-lifecycle-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

env:
  FEEDBACK_LABEL: ":mailbox_with_no_mail: needs: author feedback"
  NO_ACTIVITY_LABEL: ":zzz: status: no recent activity"

jobs:
  # Add the author-feedback label when a reviewer requests changes.
  add-needs-feedback:
    if: ${{ github.repository_owner == 'gitextensions' && github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const label = process.env.FEEDBACK_LABEL;
            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            if (!current.some(l => l.name === label)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: [label],
              });
              core.info(`Added label '${label}'.`);
            }

  # Remove the author-feedback / no-recent-activity labels on relevant activity.
  remove-labels:
    if: ${{ github.repository_owner == 'gitextensions' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const feedbackLabel = process.env.FEEDBACK_LABEL;
            const noActivityLabel = process.env.NO_ACTIVITY_LABEL;
            const eventName = context.eventName;
            const payload = context.payload;

            let issueNumber;
            let isPr;
            let author;
            let actor;

            if (eventName === 'pull_request_target') {
              // The author pushed/edited/reopened the pull request.
              issueNumber = payload.pull_request.number;
              isPr = true;
              author = payload.pull_request.user.login;
              actor = context.actor;
            } else if (eventName === 'pull_request_review') {
              issueNumber = payload.pull_request.number;
              isPr = true;
              author = payload.pull_request.user.login;
              actor = payload.review.user.login;
            } else if (eventName === 'issue_comment') {
              issueNumber = payload.issue.number;
              isPr = Boolean(payload.issue.pull_request);
              author = payload.issue.user.login;
              actor = payload.comment.user.login;
            } else {
              return;
            }

            const actorIsAuthor = actor.toLowerCase() === author.toLowerCase();

            // FabricBot rules:
            //   * Pull requests: any activity clears the no-recent-activity label;
            //     only the author's activity clears the author-feedback label.
            //   * Issues: only the author's activity clears either label.
            let removeFeedback = false;
            let removeNoActivity = false;

            if (isPr) {
              removeNoActivity = true;
              removeFeedback = actorIsAuthor;
            } else if (actorIsAuthor) {
              removeFeedback = true;
              removeNoActivity = true;
            }

            if (!removeFeedback && !removeNoActivity) {
              return;
            }

            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
            });
            const names = current.map(l => l.name);

            const removeLabel = async (name) => {
              if (names.includes(name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  name,
                });
                core.info(`Removed label '${name}'.`);
              }
            };

            if (removeFeedback) {
              await removeLabel(feedbackLabel);
            }
            if (removeNoActivity) {
              await removeLabel(noActivityLabel);
            }
