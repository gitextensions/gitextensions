name: Git Checks

on: [pull_request]

permissions:
  contents: read

jobs:
  block-fixup:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      with:
        fetch-depth: 0
    - name: Block fixup and squash commits
      run: |
        fixup_commits=$(git log --oneline origin/${{ github.base_ref }}..HEAD --grep="^fixup! \|^squash! " --format="%h %s")
        if [ -n "$fixup_commits" ]; then
          echo "::error::PR contains fixup/squash commits that must be squashed before merging:"
          echo "$fixup_commits"
          exit 1
        fi
