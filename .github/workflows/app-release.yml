name: App release (x64, arm64)

on:
  push:
    tags:
      # Any tag starting with 'v' followed by a digit: v4, v4.2, v4.2.1, v3.5-RC1, v4-beta, v4.2-rc1, v4.2.1-win32-aarch64, ...
      - 'v[0-9]*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Package
    # Releases are only produced from the upstream repository, never from forks.
    if: ${{ github.repository_owner == 'gitextensions' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, windows-11-arm ]
    uses: ./.github/workflows/_app-build-core.yml
    with:
      os: ${{ matrix.os }}
      release: true

  trigger-signing:
    name: Upload dist files to SignPath
    runs-on: ubuntu-latest
    needs: build
    # Releases are only produced from the upstream repository, never from forks.
    if: ${{ success() && github.repository_owner == 'gitextensions' && vars.ARTIFACT_SIGNING_ENABLED == 'true' }}
    permissions:
      actions: read # required so GITHUB_TOKEN can download artifacts for the SignPath connector
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Display artifacts
        run: ls -R ./artifacts

      - name: Upload unsigned artifacts
        id:   upload-unsigned-artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: GE-v${{ needs.build.outputs.version }}-unsigned
          path: ./artifacts/*
          retention-days: 7

      - name: Submit signing request to SignPath
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The connector authenticates to SignPath via the API token (Authorization header),
          # and uses gitHubToken to download the artifact directly from GitHub Actions.
          $body = @{
            artifactId                       = "${{ steps.upload-unsigned-artifacts.outputs.artifact-id }}"
            gitHubWorkflowRunId              = "${{ github.run_id }}"
            gitHubRepository                 = "${{ github.repository }}"
            gitHubToken                      = $env:GITHUB_TOKEN
            signPathProjectSlug              = "GitExtensions_combined"
            signPathSigningPolicySlug        = "release-2020"
          } | ConvertTo-Json

          $response = Invoke-RestMethod `
            -Uri "https://githubactions.connectors.signpath.io/7c19b2cf-90f7-4d15-9b12-1b615f7c18c4/SigningRequests?api-version=1.0" `
            -Method POST `
            -Headers @{
              "Content-Type"  = "application/json"
              "Authorization" = "Bearer $env:SIGNPATH_API_TOKEN"
            } `
            -Body $body
          Write-Host "Signing request submitted: $($response.signingRequestId)"
        shell: pwsh
