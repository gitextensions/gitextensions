name: CI

on:
  push:
    branches-ignore:
      - configdata
      - gh-pages
      - 'experimental/**'
      - 'translations_*'
  pull_request:
    branches-ignore:
      - configdata
      - gh-pages
      - 'experimental/**'
      - 'translations_*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    # Windows runner is required: the project targets net10.0-windows (WinForms),
    # builds native C++ shell extensions (MSVC), and creates MSI installers (WiX).
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Show tool versions
      run: |
        dotnet --version
        git --version
        python --version

    - name: Set version
      working-directory: eng
      run: python set_version_to.py -v 7.0.0.${{ github.run_number }} -t 7.0.0.${{ github.run_number }}

    - name: Resolve PR build properties
      if: github.event_name == 'pull_request'
      shell: pwsh
      run: |
        $prHeadSha = "${{ github.event.pull_request.head.sha }}"
        $gitCommit = git rev-parse --short $prHeadSha
        "BUILD_ARGS=/p:GitCommit=$gitCommit /p:GitSha=$prHeadSha" >> $env:GITHUB_ENV

    - name: Build native code
      run: dotnet build src\native\build.proj -c Release --verbosity q --nologo /bl:artifacts\log\native.binlog

    - name: Build .NET
      shell: pwsh
      run: |
        $cmd = "dotnet build -c Release --verbosity q --nologo /bl:artifacts\log\build.binlog /p:ContinuousIntegrationBuild=true $env:BUILD_ARGS"
        Invoke-Expression $cmd

    - name: Verify localisation
      shell: pwsh
      run: |
        git reset --hard HEAD
        Push-Location src\app\GitExtensions
        dotnet msbuild /p:Configuration=Release /t:_UpdateEnglishTranslations /p:RunTranslationApp=true /p:ContinuousIntegrationBuild=true /v:m /bl:${{ github.workspace }}\artifacts\log\localise.binlog
        $exitCode = $LASTEXITCODE
        Pop-Location
        if ($exitCode -ne 0) { exit $exitCode }

    - name: Run tests
      run: dotnet test -c Release --no-restore --no-build --nologo --verbosity q --test-adapter-path:. --logger:trx /bl:artifacts\log\tests.binlog

    - name: Test report
      uses: dorny/test-reporter@v1
      if: always()
      with:
        name: Test Results
        path: 'artifacts/**/TestsResults/**/*.trx'
        reporter: dotnet-trx

    - name: Publish
      shell: pwsh
      run: |
        $cmd = "dotnet publish -c Release --no-build /bl:artifacts\log\publish.binlog /p:ContinuousIntegrationBuild=true $env:BUILD_ARGS"
        Invoke-Expression $cmd

    - name: Upload portable artifact
      uses: actions/upload-artifact@v4
      with:
        name: GitExtensions-Portable
        path: artifacts\Release\publish\*.zip
        if-no-files-found: warn

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: 'artifacts\Release\TestsResults\**\*.trx'
        if-no-files-found: ignore

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          artifacts\**\log\**\*.binlog
          artifacts\Release\TestsResults\**\*.trx
          **\English*.xlf
          artifacts\Release\**\*.dgml
        if-no-files-found: ignore
