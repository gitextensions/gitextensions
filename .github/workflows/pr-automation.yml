name: PR Automation

# Automations applied to pull requests:
#
#   * Assign each new (or reopened) pull request to its author.
#   * Apply the 'vNext' milestone to pull requests merged into the default branch.
#
# `pull_request_target` is used so the elevated token can assign users and set
# milestones on pull requests opened from forks. No fork code is executed.
on:
  pull_request_target:
    types: [opened, reopened, closed]

permissions:
  contents: read

jobs:
  assign-author:
    if: ${{ github.repository_owner == 'gitextensions' && (github.event.action == 'opened' || github.event.action == 'reopened') && github.event.pull_request.user.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const pr = context.payload.pull_request;
            if (pr.assignees && pr.assignees.length > 0) {
              core.info(`PR #${pr.number} already has assignees; skipping.`);
              return;
            }
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [pr.user.login],
            });
            core.info(`Assigned PR #${pr.number} to '${pr.user.login}'.`);

  milestone-vnext:
    if: ${{ github.repository_owner == 'gitextensions' && github.event.action == 'closed' && github.event.pull_request.merged == true && github.event.pull_request.base.ref == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const milestoneTitle = 'vNext';
            const pr = context.payload.pull_request;

            // Do not override a milestone that has already been set manually.
            if (pr.milestone) {
              core.info(`PR #${pr.number} already has milestone '${pr.milestone.title}'.`);
              return;
            }

            const milestones = await github.paginate(github.rest.issues.listMilestones, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const milestone = milestones.find(m => m.title === milestoneTitle);
            if (!milestone) {
              core.warning(`Milestone '${milestoneTitle}' not found; skipping.`);
              return;
            }

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              milestone: milestone.number,
            });
            core.info(`Applied milestone '${milestoneTitle}' to PR #${pr.number}.`);
