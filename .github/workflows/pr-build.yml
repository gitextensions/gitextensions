name: PR Build

on:
  push:
    branches:
      - master
      - 'release/**'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BUILD_VERSION: 7.0.0.${{ github.run_number }}

jobs:
  build:
    name: Build
    runs-on: windows-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      build-output-artifact-id: ${{ steps.upload-build-output.outputs.artifact-id }}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Show tool versions
      run: |
        dotnet --version
        git --version

    - name: Set version
      working-directory: eng
      run: dotnet run set_version_to.cs -- -v ${{ env.BUILD_VERSION }} -t ${{ env.BUILD_VERSION }}

    - name: Resolve PR build properties
      if: github.event_name == 'pull_request'
      shell: pwsh
      run: |
        $prHeadSha = "${{ github.event.pull_request.head.sha }}"
        $gitCommit = git rev-parse --short $prHeadSha
        "BUILD_ARGS=/p:GitCommit=$gitCommit /p:GitSha=$prHeadSha" >> $env:GITHUB_ENV

    - name: Build native code
      run: dotnet build src\native\build.proj -c Release --verbosity q --nologo /bl:artifacts\log\native.binlog

    - name: Build .NET
      shell: pwsh
      run: |
        $buildArgs = "/p:ContinuousIntegrationBuild=true $env:BUILD_ARGS".Trim()
        dotnet build -c Release --verbosity q --nologo /bl:artifacts\log\build.binlog $buildArgs.Split(' ', [StringSplitOptions]::RemoveEmptyEntries)

    - name: Verify localisation
      shell: pwsh
      run: |
        git reset --hard HEAD
        Push-Location src\app\GitExtensions
        dotnet msbuild /p:Configuration=Release /t:_UpdateEnglishTranslations /p:RunTranslationApp=true /p:ContinuousIntegrationBuild=true /v:m /bl:${{ github.workspace }}\artifacts\log\localise.binlog
        $exitCode = $LASTEXITCODE
        Pop-Location
        if ($exitCode -ne 0) { exit $exitCode }

    - name: Publish
      shell: pwsh
      run: |
        $buildArgs = "/p:ContinuousIntegrationBuild=true $env:BUILD_ARGS".Trim()
        dotnet publish -c Release --no-build /bl:artifacts\log\publish.binlog $buildArgs.Split(' ', [StringSplitOptions]::RemoveEmptyEntries)

    - name: Resolve portable archive name
      id: portable-name
      shell: pwsh
      run: |
        $zip = Get-ChildItem artifacts\Release\publish\*.zip | Select-Object -First 1
        "name=$($zip.BaseName)" >> $env:GITHUB_OUTPUT

    - name: Upload portable archive
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ steps.portable-name.outputs.name }}
        path: 'artifacts\Release\publish\*.zip'

    - name: Delete publish folder because not needed for tests
      run: Remove-Item -Recurse -Force artifacts\Release\publish

    - name: Upload build output
      id: upload-build-output
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: build-output
        path: 'artifacts\Release'
        if-no-files-found: error
        retention-days: 1

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: build-logs
        path: |
          artifacts\**\log\**\*.binlog
          **\English*.xlf
          artifacts\Release\**\*.dgml
        if-no-files-found: ignore

  test:
    name: Test
    runs-on: windows-latest
    timeout-minutes: 30
    needs: build
    if: always() && needs.build.result == 'success'
    permissions:
      contents: read
    outputs:
      test-results-artifact-id: ${{ steps.upload-test-results.outputs.artifact-id }}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Download build output
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        artifact-ids: ${{ needs.build.outputs.build-output-artifact-id }}
        path: 'artifacts\Release'
        merge-multiple: true

    - name: Run tests
      run: dotnet test -c Release --no-restore --no-build --nologo --verbosity q --test-adapter-path:. --logger:trx /bl:artifacts\log\tests.binlog

    - name: Upload test results
      id: upload-test-results
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: test-results
        path: 'artifacts\Release\TestsResults\**\*.trx'
        if-no-files-found: ignore

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: test-logs
        path: |
          artifacts\**\log\**\*.binlog
          artifacts\Release\TestsResults\**\*.trx
        if-no-files-found: ignore

  test-report:
    name: Test Results
    runs-on: ubuntu-latest
    needs: test
    if: always() && needs.test.result != 'skipped'
    permissions:
      actions: read
      contents: read
      checks: write

    steps:
    - name: Download test results
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        artifact-ids: ${{ needs.test.outputs.test-results-artifact-id }}
        path: test-results
        merge-multiple: true

    - name: Test report
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
      continue-on-error: true
      with:
        name: Test Results
        path: 'test-results/**/*.trx'
        reporter: dotnet-trx
