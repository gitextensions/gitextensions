name: PR Build

on:
  push:
    branches-ignore:
      - configdata
      - gh-pages
      - 'translations_*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
      with:
        dotnet-version: '10.0.x'

    - name: Cache NuGet packages
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: Show tool versions
      run: |
        dotnet --version
        git --version

    - name: Set version
      working-directory: eng
      run: dotnet run set_version_to.cs -- -v 7.0.0.${{ github.run_number }} -t 7.0.0.${{ github.run_number }}

    - name: Resolve PR build properties
      if: github.event_name == 'pull_request'
      shell: pwsh
      run: |
        $prHeadSha = "${{ github.event.pull_request.head.sha }}"
        $gitCommit = git rev-parse --short $prHeadSha
        "BUILD_ARGS=/p:GitCommit=$gitCommit /p:GitSha=$prHeadSha" >> $env:GITHUB_ENV

    - name: Build native code
      run: dotnet build src\native\build.proj -c Release --verbosity q --nologo /bl:artifacts\log\native.binlog

    - name: Build .NET
      shell: pwsh
      run: |
        $buildArgs = "/p:ContinuousIntegrationBuild=true $env:BUILD_ARGS".Trim()
        dotnet build -c Release --verbosity q --nologo /bl:artifacts\log\build.binlog $buildArgs.Split(' ', [StringSplitOptions]::RemoveEmptyEntries)

    - name: Verify localisation
      shell: pwsh
      run: |
        git reset --hard HEAD
        Push-Location src\app\GitExtensions
        dotnet msbuild /p:Configuration=Release /t:_UpdateEnglishTranslations /p:RunTranslationApp=true /p:ContinuousIntegrationBuild=true /v:m /bl:${{ github.workspace }}\artifacts\log\localise.binlog
        $exitCode = $LASTEXITCODE
        Pop-Location
        if ($exitCode -ne 0) { exit $exitCode }

    - name: Run tests
      run: dotnet test -c Release --no-restore --no-build --nologo --verbosity q --test-adapter-path:. --logger:trx /bl:artifacts\log\tests.binlog

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: test-results
        path: 'artifacts\Release\TestsResults\**\*.trx'
        if-no-files-found: ignore

    - name: Upload build logs on failure
      if: failure()
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
      with:
        name: build-logs
        path: |
          artifacts\**\log\**\*.binlog
          artifacts\Release\TestsResults\**\*.trx
          **\English*.xlf
          artifacts\Release\**\*.dgml
        if-no-files-found: ignore